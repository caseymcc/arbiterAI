name: Point Release

on:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  point-release:
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot (version bump commit)
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: read

    steps:
    - name: Check if push is from a merged PR
      id: check_pr
      uses: actions/github-script@v7
      with:
        script: |
          const commits = await github.rest.repos.listPullRequestsAssociatedWithCommit({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha
          });
          const merged = commits.data.filter(pr => pr.merged_at !== null);
          if (merged.length === 0) {
            core.setOutput('is_pr_merge', 'false');
            core.info('Push is not from a merged PR — skipping release.');
            return;
          }
          const pr = merged[0];
          core.setOutput('is_pr_merge', 'true');
          core.setOutput('pr_number', pr.number.toString());
          core.setOutput('pr_title', pr.title);
          core.setOutput('pr_url', pr.html_url);

    - name: Checkout repository
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Bump patch version
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      id: bump
      run: |
        chmod +x ./scripts/version.sh
        OLD_VERSION=$(./scripts/version.sh get)
        NEW_VERSION=$(./scripts/version.sh bump patch)
        echo "old_version=${OLD_VERSION}" >> $GITHUB_OUTPUT
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "Bumped version: ${OLD_VERSION} → ${NEW_VERSION}"

    - name: Commit version bump
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      run: |
        git add CMakeLists.txt
        git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }} [skip ci]"

    - name: Create tag
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      run: |
        git tag "v${{ steps.bump.outputs.new_version }}"

    - name: Push commit and tag
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      run: |
        git push origin HEAD --follow-tags

    - name: Create GitHub Release
      if: steps.check_pr.outputs.is_pr_merge == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.bump.outputs.new_version }}"
        name: "v${{ steps.bump.outputs.new_version }}"
        body: |
          Point release from PR #${{ steps.check_pr.outputs.pr_number }}: ${{ steps.check_pr.outputs.pr_title }}

          ${{ steps.check_pr.outputs.pr_url }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
