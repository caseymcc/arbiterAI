name: Release Major/Minor

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
    - name: Checkout source branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Calculate new version and branch
      id: version
      run: |
        chmod +x ./scripts/version.sh
        CURRENT=$(./scripts/version.sh get)
        IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

        if [ "${{ inputs.release_type }}" = "major" ]; then
          NEW_MAJOR=$((MAJOR+1))
          NEW_MINOR=0
          NEW_VERSION="${NEW_MAJOR}.0.0"
          BRANCH="release/${NEW_MAJOR}.0"
        else
          NEW_MINOR=$((MINOR+1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
          BRANCH="release/${MAJOR}.${NEW_MINOR}"
        fi

        echo "current=${CURRENT}" >> $GITHUB_OUTPUT
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
        echo "Release type: ${{ inputs.release_type }}"
        echo "Current version: ${CURRENT}"
        echo "New version: ${NEW_VERSION}"
        echo "Branch: ${BRANCH}"

    - name: Create release branch
      run: |
        git checkout -b "${{ steps.version.outputs.branch }}"

    - name: Set version on release branch
      run: |
        ./scripts/version.sh set "${{ steps.version.outputs.new_version }}"

    - name: Commit version bump
      run: |
        git add CMakeLists.txt
        git commit -m "release: v${{ steps.version.outputs.new_version }}"

    - name: Create tag
      run: |
        git tag "v${{ steps.version.outputs.new_version }}"

    - name: Push branch and tag
      run: |
        git push origin "${{ steps.version.outputs.branch }}" --follow-tags

    # --- Build artifacts ---

    - name: Extract Docker version
      id: docker_version
      run: |
        VERSION=$(grep -oP '(?<=^ARG DOCKER_VERSION=)[0-9]+\.[0-9]+\.[0-9]+' docker/Dockerfile)
        echo "DOCKER_VERSION=$VERSION" >> $GITHUB_OUTPUT
        REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "REPO_LC=$REPO_LC" >> $GITHUB_OUTPUT

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ghcr.io/${{ steps.docker_version.outputs.REPO_LC }}
          arbiterai-dev
        tags: |
          type=raw,value=${{ steps.docker_version.outputs.DOCKER_VERSION }}

    - name: Build and cache Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/${{ steps.docker_version.outputs.REPO_LC }}:${{ steps.docker_version.outputs.DOCKER_VERSION }}
        cache-to: type=inline

    - name: Create cache directories
      run: |
        mkdir -p models
        mkdir -p vcpkg_cache

    - name: Cache vcpkg
      uses: actions/cache@v3
      with:
        path: vcpkg_cache
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Build project
      run: ./runDocker.sh --ci ./build.sh
      env:
        VCPKG_CACHE_PATH: ${{ github.workspace }}/vcpkg_cache

    # --- Package artifacts ---

    - name: Package release artifacts
      id: package
      run: |
        VERSION="${{ steps.version.outputs.new_version }}"
        ARTIFACT_DIR="arbiterAI-v${VERSION}-linux-x64"

        mkdir -p "${ARTIFACT_DIR}/lib"
        mkdir -p "${ARTIFACT_DIR}/bin"
        mkdir -p "${ARTIFACT_DIR}/include/arbiterAI"

        # Copy library
        cp build/linux_x64_debug/libarbiterai.a "${ARTIFACT_DIR}/lib/" 2>/dev/null || true
        cp build/linux_x64_debug/libarbiterai.so "${ARTIFACT_DIR}/lib/" 2>/dev/null || true

        # Copy binaries
        cp build/linux_x64_debug/arbiterAI-server "${ARTIFACT_DIR}/bin/" 2>/dev/null || true
        cp build/linux_x64_debug/arbiterAI-cli "${ARTIFACT_DIR}/bin/" 2>/dev/null || true

        # Copy headers
        cp src/arbiterAI/*.h "${ARTIFACT_DIR}/include/arbiterAI/" 2>/dev/null || true
        cp build/linux_x64_debug/generated/arbiterAI/version.h "${ARTIFACT_DIR}/include/arbiterAI/" 2>/dev/null || true

        # Copy license
        cp LICENSE "${ARTIFACT_DIR}/"

        # Create tarball
        TARBALL="arbiterAI-v${VERSION}-linux-x64.tar.gz"
        tar -czf "${TARBALL}" "${ARTIFACT_DIR}"
        echo "tarball=${TARBALL}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.new_version }}"
        name: "v${{ steps.version.outputs.new_version }}"
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ${{ steps.package.outputs.tarball }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
